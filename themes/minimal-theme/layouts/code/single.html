{{ define "title" }}{{ .Title }} | {{ .Site.Title }}{{ end }}
{{ define "main" }}
<article class="code-single">
  <div class="container-narrow">
    <header class="code-header">
      <h1>{{ .Title }}</h1>
      {{ if .Params.tags }}
        <div class="code-tags">
          {{ range .Params.tags }}
            <span class="code-tag">{{ . }}</span>
          {{ end }}
        </div>
      {{ end }}
    </header>
    
    <div class="code-content">
      {{ .Content }}
    </div>
    
    <footer class="code-footer">
      <div class="back-link">
        <a href="/code/">← 返回代码列表</a>
      </div>
    </footer>
  </div>
</article>

<style>
.code-single {
  padding: var(--spacing-lg) 0;
}

.code-header {
  text-align: center;
  margin-bottom: var(--spacing-lg);
  padding-bottom: var(--spacing-md);
  border-bottom: 2px solid var(--border-color);
}

.code-header h1 {
  font-size: 2.2rem;
  margin-bottom: var(--spacing-sm);
  line-height: 1.3;
}

.code-tags {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: var(--spacing-sm);
}

.code-tag {
  background-color: rgba(162, 123, 92, 0.15);
  color: var(--link-color);
  padding: 0.2rem 0.6rem;
  border-radius: 4px;
  font-size: 0.85rem;
  font-family: var(--font-mono);
}

.code-content {
  font-family: var(--font-serif);
  font-size: 17px;
  line-height: 1.9;
  color: var(--text-color);
  margin-bottom: var(--spacing-xl);
}

.code-content p {
  margin-bottom: 1.2em;
}

.code-content h2,
.code-content h3 {
  font-family: var(--font-sans);
  margin-top: var(--spacing-lg);
  margin-bottom: var(--spacing-md);
  font-weight: 600;
}

.code-content code {
  font-family: var(--font-mono);
  font-size: 0.9em;
  background-color: var(--bg-secondary);
  padding: 0.15em 0.4em;
  border-radius: 3px;
}

.code-content pre {
  background-color: var(--bg-secondary);
  border-radius: 6px;
  padding: var(--spacing-sm) var(--spacing-md);
  overflow-x: auto;
  margin: var(--spacing-md) 0;
  font-size: 14px;
  line-height: 1.6;
  border: 1px solid var(--border-color);
}

.code-content pre code {
  background: none;
  padding: 0;
  font-size: inherit;
}

.code-content ul, .code-content ol {
  margin: var(--spacing-sm) 0 var(--spacing-sm) 1.5em;
}

.code-content li {
  margin-bottom: 0.5em;
}

.code-content a {
  color: var(--link-color);
  border-bottom: 1px solid transparent;
  transition: border-color var(--transition);
}

.code-content a:hover {
  border-bottom-color: var(--link-color);
}

.code-footer {
  border-top: 2px solid var(--border-color);
  padding-top: var(--spacing-lg);
  margin-top: var(--spacing-xl);
  text-align: center;
}

.back-link a {
  color: var(--link-color);
  font-size: 0.95rem;
}

.back-link a:hover {
  color: var(--link-hover);
}

@media (max-width: 768px) {
  .code-header h1 {
    font-size: 1.75rem;
  }
  .code-content {
    font-size: 16px;
  }
}
</style>
{{ end }}

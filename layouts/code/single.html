{{ define "title" }}{{ .Title }} | {{ .Site.Title }}{{ end }}
{{ define "main" }}
<article class="code-single">
  <div class="container-narrow">
    <header class="code-header">
      <h1>{{ .Title }}</h1>
      <div class="code-header-meta">
        <span class="code-date">{{ .Date.Format "2006-01-02" }}</span>
        {{ range .Params.tags }}
          <span class="code-tag">{{ . }}</span>
        {{ end }}
      </div>
    </header>

    <div class="code-content">
      {{ .Content }}
    </div>

    <footer class="code-footer">
      <a href="/code/" class="nav-link nav-list">← 返回代码列表</a>
    </footer>
  </div>
</article>

<style>
.code-single {
  padding: var(--spacing-lg) 0;
}

.code-header {
  text-align: center;
  margin-bottom: var(--spacing-lg);
  padding-bottom: var(--spacing-md);
  border-bottom: 2px solid var(--border-color);
}

.code-header h1 {
  font-size: 2.2rem;
  margin-bottom: var(--spacing-sm);
  line-height: 1.3;
}

.code-header-meta {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
}

.code-date {
  color: var(--text-color);
  opacity: 0.6;
  font-size: 0.9rem;
}

.code-tag {
  background-color: rgba(162, 123, 92, 0.15);
  color: var(--link-color);
  padding: 0.2rem 0.6rem;
  border-radius: 4px;
  font-size: 0.8rem;
  font-family: var(--font-mono);
}

.code-content {
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.8;
  color: var(--text-color);
  margin-bottom: var(--spacing-xl);
}

.code-content h2,
.code-content h3,
.code-content h4 {
  font-family: var(--font-sans);
  margin-top: var(--spacing-lg);
  margin-bottom: var(--spacing-md);
}

.code-content p {
  margin-bottom: 1.2em;
}

.code-content ul,
.code-content ol {
  margin-bottom: 1.2em;
  padding-left: 2em;
}

.code-content li {
  margin-bottom: 0.4em;
}

.code-content code {
  background-color: var(--bg-secondary);
  padding: 0.15em 0.4em;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.9em;
}

.code-content pre {
  background-color: var(--bg-secondary);
  padding: 1rem 1.25rem;
  border-radius: 6px;
  overflow-x: auto;
  margin: 1.2em 0;
  border: 1px solid var(--border-color);
}

.code-content pre code {
  background: none;
  padding: 0;
  font-size: 0.9rem;
  line-height: 1.6;
}

.code-footer {
  border-top: 2px solid var(--border-color);
  padding-top: var(--spacing-lg);
  text-align: center;
}

.nav-list {
  display: inline-block;
  padding: var(--spacing-sm) var(--spacing-lg);
  background-color: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-color);
  border-radius: 4px;
  transition: all var(--transition);
  font-size: 0.95rem;
  text-decoration: none;
}

.nav-list:hover {
  background-color: var(--link-color);
  border-color: var(--link-color);
  color: white;
}

@media (max-width: 768px) {
  .code-header h1 {
    font-size: 1.8rem;
  }
}
</style>
{{ end }}
